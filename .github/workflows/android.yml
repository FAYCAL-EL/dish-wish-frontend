name: Android CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: Package Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug artifacts
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/

      - name: Set build status
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const conclusion = context.job.status === 'success' ? 'success' : 'failure';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: conclusion,
              context: 'GitHub Actions',
              description: 'Build and Test',
            });
            
  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set recipient email based on github.actor
        id: set_recipient
        run: |
          if [[ "${{ github.actor }}" == "FAYCAL-EL" ]]; then
            echo "faysalelourrat@gmail.com" > recipient_email
          elif [[ "${{ github.actor }}" == "ahcinechaymae" ]]; then
            echo "chaymaa.ahcine@uit.ac.ma" > recipient_email
          elif [[ "${{ github.actor }}" == "khaoulazaar" ]]; then
            echo "khaoula.lazaar@uit.ac.ma" > recipient_email
          elif [[ "${{ github.actor }}" == "moamine1996" ]]; then
            echo "mohamedamine.elkaaba@uit.ac.ma" > recipient_email
          else
            echo "unknown-email@example.com" > recipient_email
          fi

      - name: Send email on success
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Build succeeded on ${{ github.ref }}
          body: |
            Build succeeded for ${{ github.workflow }} on ${{ github.ref }}.
            See the build log here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ steps.set_recipient.outputs.recipient_email }}
          from: "${{ secrets.EMAIL_SENDER }}"
